<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & shadows" subtitle="Soft warm shadows + Memphis pop" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .box { width: 88px; height: 72px; background: var(--color-surface); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; box-sizing: border-box; }
  .lbl { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius:6px;box-shadow:var(--shadow-sm);border:1px solid var(--border-subtle)"><span class="lbl">sm · 6px</span></div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-md);border:1px solid var(--border-subtle)"><span class="lbl">md · 12px</span></div>
    <div class="box" style="border-radius:20px;box-shadow:var(--shadow-lg);border:1px solid var(--border-subtle)"><span class="lbl">lg · 20px</span></div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-pop);border:2px solid var(--ink-900)"><span class="lbl">pop</span></div>
    <div class="box" style="border-radius:12px;box-shadow:var(--shadow-pop-coral);border:2px solid var(--ink-900)"><span class="lbl">pop coral</span></div>
  </div>
</body>
</html>
