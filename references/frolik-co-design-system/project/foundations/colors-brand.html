<!-- @dsCard group="Colors" viewport="700x180" name="Brand palette" subtitle="Coral + mint ramps from the logo" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 20px; }
  .ramp { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-900); }
  .swatches { display: flex; gap: 6px; }
  .sw { width: 72px; height: 56px; border-radius: 10px; border: 2px solid var(--ink-900); display: flex; align-items: flex-end; padding: 5px; box-sizing: border-box; }
  .sw span { font-family: var(--font-body); font-size: 9px; font-weight: 600; color: rgba(42,38,34,0.65); }
</style>
</head>
<body>
  <div class="row">
    <div class="ramp">
      <div class="label">Coral · primary</div>
      <div class="swatches">
        <div class="sw" style="background:var(--coral-100)"><span>100</span></div>
        <div class="sw" style="background:var(--coral-200)"><span>200</span></div>
        <div class="sw" style="background:var(--coral-300)"><span>300</span></div>
        <div class="sw" style="background:var(--coral-400)"><span style="color:#fff">400</span></div>
        <div class="sw" style="background:var(--coral-500)"><span style="color:#fff">500</span></div>
        <div class="sw" style="background:var(--coral-600)"><span style="color:#fff">600</span></div>
      </div>
    </div>
    <div class="ramp">
      <div class="label">Mint · secondary</div>
      <div class="swatches">
        <div class="sw" style="background:var(--mint-100)"><span>100</span></div>
        <div class="sw" style="background:var(--mint-200)"><span>200</span></div>
        <div class="sw" style="background:var(--mint-300)"><span>300</span></div>
        <div class="sw" style="background:var(--mint-400)"><span>400</span></div>
        <div class="sw" style="background:var(--mint-500)"><span style="color:#fff">500</span></div>
        <div class="sw" style="background:var(--mint-600)"><span style="color:#fff">600</span></div>
      </div>
    </div>
  </div>
</body>
</html>
