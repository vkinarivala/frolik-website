<!-- @dsCard group="Colors" viewport="700x180" name="Warm neutrals" subtitle="Paper, sand, clay, taupe, ink" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 20px; }
  .swatches { display: flex; gap: 8px; }
  .sw { flex: 1; height: 96px; border-radius: 10px; border: 2px solid var(--ink-900); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .name { font-family: var(--font-display); font-size: 11px; font-weight: 600; }
  .val { font-family: var(--font-body); font-size: 10px; opacity: 0.6; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:var(--cream-50)"><span class="name">cream-50</span><span class="val">#FDFAF5</span></div>
    <div class="sw" style="background:var(--cream-100)"><span class="name">cream-100</span><span class="val">#FBF6EF</span></div>
    <div class="sw" style="background:var(--sand-200)"><span class="name">sand-200</span><span class="val">#F1E8DC</span></div>
    <div class="sw" style="background:var(--sand-300)"><span class="name">sand-300</span><span class="val">#E4D6C4</span></div>
    <div class="sw" style="background:var(--clay-400)"><span class="name">clay-400</span><span class="val">#C9B7A5</span></div>
    <div class="sw" style="background:var(--taupe-500);color:#fff"><span class="name">taupe-500</span><span class="val">#8C7B6B</span></div>
    <div class="sw" style="background:var(--ink-800);color:#fff"><span class="name">ink-800</span><span class="val">#3A342F</span></div>
    <div class="sw" style="background:var(--ink-900);color:#fff"><span class="name">ink-900</span><span class="val">#2A2622</span></div>
  </div>
</body>
</html>
