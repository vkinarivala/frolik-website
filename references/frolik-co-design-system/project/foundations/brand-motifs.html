<!-- @dsCard group="Brand" viewport="700x180" name="Shape motifs" subtitle="Memphis stickers lifted from the logo" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 22px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .lbl { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--ink-900); }
  svg { display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><path d="M40 8 h20 v32 h32 v20 h-32 v32 h-20 v-32 h-32 v-20 h32 z" fill="var(--coral-400)"/></svg>
      <span class="lbl">plus</span>
    </div>
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><defs><clipPath id="c1"><circle cx="50" cy="50" r="46"/></clipPath></defs><g clip-path="url(#c1)"><rect x="6" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="18" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="30" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="42" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="54" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="66" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="78" y="0" width="4" height="100" fill="var(--coral-400)"/><rect x="90" y="0" width="4" height="100" fill="var(--coral-400)"/></g><circle cx="50" cy="50" r="46" fill="none" stroke="var(--coral-400)" stroke-width="3"/></svg>
      <span class="lbl">striped</span>
    </div>
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><rect x="38" y="6" width="24" height="88" rx="4" fill="var(--coral-400)" transform="rotate(20 50 50)"/></svg>
      <span class="lbl">slash</span>
    </div>
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><defs><clipPath id="c2"><circle cx="50" cy="50" r="46"/></clipPath></defs><g clip-path="url(#c2)"><rect x="0" y="0" width="100" height="100" fill="var(--mint-300)"/><path d="M0 100 L100 0 L100 100 Z" fill="var(--coral-400)"/></g></svg>
      <span class="lbl">split</span>
    </div>
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><path d="M6 96 A44 44 0 0 1 94 96" fill="none" stroke="var(--mint-400)" stroke-width="16" stroke-linecap="round"/></svg>
      <span class="lbl">arc</span>
    </div>
    <div class="item">
      <svg width="60" height="60" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="var(--sun-400)"/></svg>
      <span class="lbl">dot</span>
    </div>
  </div>
</body>
</html>
