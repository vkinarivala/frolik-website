<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 22px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--mint-300); border: 2px solid var(--ink-900); border-radius: 4px; width: 100%; }
  .lbl { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:4px"></div><span class="lbl">4</span></div>
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><span class="lbl">8</span></div>
    <div class="item"><div class="bar" style="height:12px;width:12px"></div><span class="lbl">12</span></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><span class="lbl">16</span></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><span class="lbl">24</span></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><span class="lbl">32</span></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><span class="lbl">48</span></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><span class="lbl">64</span></div>
  </div>
</body>
</html>
