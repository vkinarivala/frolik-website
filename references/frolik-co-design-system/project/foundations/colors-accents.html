<!-- @dsCard group="Colors" viewport="700x150" name="Playful accents" subtitle="Sunny yellow + sky blue, used sparingly" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; height: 90px; border-radius: 12px; border: 2px solid var(--ink-900); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .name { font-family: var(--font-display); font-size: 13px; font-weight: 600; }
  .val { font-family: var(--font-body); font-size: 11px; opacity: 0.65; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--sun-400)"><span class="name">sun-400</span><span class="val">#F2C14E</span></div>
    <div class="sw" style="background:var(--sky-400)"><span class="name">sky-400</span><span class="val">#8FC6E0</span></div>
  </div>
  <p class="note">Reserved for accents on kids-space work — never as the dominant color.</p>
</body>
</html>
