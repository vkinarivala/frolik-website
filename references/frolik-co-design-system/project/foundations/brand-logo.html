<!-- @dsCard group="Brand" viewport="700x260" name="Logo" subtitle="Primary mark — coral + mint on cream" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 24px; display: flex; gap: 28px; align-items: center; }
  .lockup { background: #fff; border-radius: 14px; padding: 16px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); }
  .lockup img { display: block; width: 150px; height: auto; }
  .on-ink { background: var(--ink-900); }
  .notes { font-size: 13px; color: var(--text-body); line-height: 1.6; max-width: 300px; }
  .notes strong { font-family: var(--font-display); color: var(--ink-900); }
</style>
</head>
<body>
  <div class="lockup"><img src="../assets/frolik-logo.jpeg" alt="Frolik+Co logo" /></div>
  <div class="notes">
    <strong>Frolik+Co</strong> — the geometric stacked mark. Keep clear space equal to the coral border on all sides. Prefer the mark on cream or white; place on a light card when set over photography.
  </div>
</body>
</html>
