<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & scale" subtitle="Kicker label + type ramp" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); padding: 22px; color: var(--ink-900); }
  .eyebrow { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; }
  .eyebrow .rule { width: 28px; height: 3px; border-radius: 2px; background: var(--coral-400); }
  .scale { display: flex; align-items: baseline; gap: 18px; margin-top: 18px; font-family: var(--font-display); font-weight: 600; letter-spacing: -0.01em; }
  .scale span { color: var(--ink-900); }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); display: block; margin-top: 4px; }
</style>
</head>
<body>
  <span class="eyebrow"><span class="rule"></span>Our Studio</span>
  <div class="scale">
    <span style="font-size:48px">48</span>
    <span style="font-size:36px">36</span>
    <span style="font-size:24px">24</span>
    <span style="font-size:20px">20</span>
    <span style="font-size:16px">16</span>
    <span style="font-size:14px">14</span>
  </div>
  <span class="meta">Hero → clamp(48–84) · H1 48 · H2 36 · H3 24 · body 16 · small 14</span>
</body>
</html>
