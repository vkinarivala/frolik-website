<!-- @dsCard group="Colors" viewport="700x160" name="Text on color" subtitle="Legible pairings for filled surfaces" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--cream-100); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .chip { flex: 1; height: 96px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; border: 2px solid var(--ink-900); }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 20px; }
  .small { font-family: var(--font-body); font-size: 11px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="row">
    <div class="chip" style="background:var(--coral-400)"><span class="big" style="color:var(--cream-50)">Frolic</span><span class="small" style="color:var(--cream-50)">on coral → cream-50</span></div>
    <div class="chip" style="background:var(--mint-300)"><span class="big" style="color:var(--ink-900)">Frolic</span><span class="small" style="color:var(--ink-900)">on mint → ink-900</span></div>
    <div class="chip" style="background:var(--ink-900)"><span class="big" style="color:var(--cream-50)">Frolic</span><span class="small" style="color:var(--cream-50)">on ink → cream-50</span></div>
  </div>
</body>
</html>
