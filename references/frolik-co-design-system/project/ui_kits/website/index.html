<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Frolik+Co - Interior Design Studio</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--cream-100); color: var(--text-body); font-family: var(--font-body); }
  a { -webkit-tap-highlight-color: transparent; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Work.jsx"></script>
<script type="text/babel" src="StudioContact.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  const { useState } = React;
  function App() {
    const [route, setRoute] = useState('home');
    const nav = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
    const screens = {
      home: window.FKHome, work: window.FKWork, studio: window.FKStudio, contact: window.FKContact,
    };
    const Screen = screens[route] || window.FKHome;
    return (
      <div>
        <window.FKNav route={route} onNav={nav} />
        <main><Screen onNav={nav} /></main>
        <window.FKFooter onNav={nav} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
